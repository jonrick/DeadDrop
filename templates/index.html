<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeadDrop // Premium Intelligence Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-base: #0a0a0c;
            --bg-panel: rgba(20, 20, 24, 0.85);
            --bg-card: rgba(35, 35, 42, 0.6);
            --bg-card-hover: rgba(45, 45, 55, 0.8);

            --text-main: #f0f0f5;
            --text-muted: #8a8a9a;

            --accent-green: #00ff66;
            --accent-green-glow: rgba(0, 255, 102, 0.2);

            --accent-blue: #00e5ff;
            --accent-blue-glow: rgba(0, 229, 255, 0.15);

            --accent-red: #ff3366;
            --accent-red-glow: rgba(255, 51, 102, 0.15);

            --border-color: rgba(255, 255, 255, 0.08);
            --glass-blur: blur(12px);

            --font-mono: 'Fira Code', monospace;
            --font-sans: 'Inter', sans-serif;

            --transition-speed: 0.3s;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: var(--font-sans);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-image:
                radial-gradient(circle at 15% 50%, rgba(0, 255, 102, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(0, 229, 255, 0.03) 0%, transparent 50%);
        }

        /* HEADER */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 40px;
            background: rgba(10, 10, 12, 0.9);
            backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid var(--border-color);
            z-index: 10;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .brand h1 {
            font-family: var(--font-mono);
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 3px;
            color: white;
            text-transform: uppercase;
        }

        .brand .dot {
            width: 10px;
            height: 10px;
            background-color: var(--accent-green);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--accent-green);
            animation: pulse 2s infinite;
        }

        .status-panel {
            display: flex;
            gap: 30px;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .stat-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat-val {
            color: var(--accent-blue);
            font-weight: 600;
            font-size: 1rem;
        }

        /* MAIN DASHBOARD */
        main {
            flex: 1;
            padding: 30px 40px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .feed-header {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding-bottom: 15px;
            border-bottom: 1px dashed var(--border-color);
        }

        .feed-title {
            font-family: var(--font-mono);
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .feed-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding-right: 15px;
        }

        /* Scrollbar styles */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* MESSAGE CARDS */
        .message-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            transition: all var(--transition-speed) ease;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .message-card.expanded {
            overflow: visible;
        }

        .message-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--accent-green);
            transition: width var(--transition-speed) ease;
        }

        .message-card.private::before {
            background: var(--accent-red);
        }

        .message-card:hover {
            background: var(--bg-card-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.15);
        }

        /* Glow effects */
        .message-card:hover::before {
            box-shadow: 0 0 15px var(--accent-green);
        }

        .message-card.private:hover::before {
            box-shadow: 0 0 15px var(--accent-red);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-family: var(--font-mono);
            font-size: 0.85rem;
        }

        .card-meta {
            display: flex;
            gap: 20px;
            color: var(--text-muted);
        }

        .routing-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .src-dst {
            background: rgba(0, 0, 0, 0.4);
            padding: 4px 10px;
            border-radius: 4px;
            color: var(--text-main);
        }

        .arrow {
            color: var(--text-muted);
        }

        .global-tag {
            color: var(--accent-green);
        }

        .private-tag {
            color: var(--accent-red);
        }

        .mission-tag {
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .card-body {
            font-family: var(--font-sans);
            font-size: 1rem;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.9);

            /* Clamping for unexpanded state */
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .message-card.expanded .card-body {
            display: block;
            -webkit-line-clamp: unset;
            -webkit-box-orient: horizontal;
        }

        .expand-hint {
            margin-top: 15px;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--accent-blue);
            opacity: 0;
            transition: opacity var(--transition-speed);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .message-card:hover .expand-hint {
            opacity: 0.7;
        }

        .message-card.expanded .expand-hint {
            opacity: 0;
            display: none;
        }

        /* ANIMATIONS */
        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(0, 255, 102, 0.4);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(0, 255, 102, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(0, 255, 102, 0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            color: var(--text-muted);
            font-family: var(--font-mono);
            margin-top: 50px;
            font-style: italic;
            opacity: 0.6;
        }
    </style>
</head>

<body>

    <header>
        <div class="brand">
            <div class="dot"></div>
            <h1>DeadDrop</h1>
        </div>
        <div class="status-panel">
            <div class="stat-group">
                <span>LOCAL TIME (UTC)</span>
                <span class="stat-val" id="clock">00:00:00</span>
            </div>
            <div class="stat-group">
                <span>ACTIVE AGENTS</span>
                <span class="stat-val" id="agent-count">0</span>
            </div>
            <div class="stat-group">
                <span>NETWORK STATUS</span>
                <span class="stat-val" style="color: var(--accent-green);">OPERATIONAL</span>
            </div>
        </div>
    </header>

    <main>
        <div class="feed-header">
            <div class="feed-title">Master Intelligence Feed // Unified Stream</div>
            <div class="feed-title" style="font-size: 0.8rem; opacity: 0.6;">[Auto-updating]</div>
        </div>

        <div class="feed-container" id="feed-container">
            <div class="empty-state">Initializing secure connection... awaiting agent intercepts.</div>
        </div>
    </main>

    <script>
        // Update Clock
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toISOString().substring(11, 19);
        }
        setInterval(updateClock, 1000);
        updateClock();

        function formatTime(isoString) {
            const date = new Date(isoString);
            return date.toISOString().replace('T', ' ').substring(0, 19);
        }

        // Card expansion logic
        function toggleExpand(element) {
            element.classList.toggle('expanded');
        }

        // Fetch and Render Data
        let renderedMessageIds = new Set();
        let isFirstRender = true;

        async function updateDashboard() {
            try {
                // Strip inline credentials to avoid Fetch API TypeError
                const feedUrl = window.location.origin + '/api/dashboard_data';
                const response = await fetch(feedUrl);
                const data = await response.json();

                document.getElementById('agent-count').textContent = data.agent_count;

                const feedContainer = document.getElementById('feed-container');
                const messages = data.messages;

                if (messages.length === 0) return;

                if (isFirstRender) {
                    feedContainer.innerHTML = ''; // Clear the "awaiting intercepts" empty state
                    isFirstRender = false;
                }

                // Render only new messages. Since messages from API are descending (newest first),
                // we iterate backwards to prepend oldest unseen messages first, maintaining correct order.
                for (let i = messages.length - 1; i >= 0; i--) {
                    const msg = messages[i];

                    if (!renderedMessageIds.has(msg.id)) {
                        renderedMessageIds.add(msg.id);

                        const isPrivate = msg.is_private;
                        const cardClass = isPrivate ? 'message-card private' : 'message-card';
                        const destClass = isPrivate ? 'private-tag' : 'global-tag';
                        const icon = isPrivate ? '🔒' : '🌐';

                        // Create card element
                        const div = document.createElement('div');
                        div.className = cardClass;
                        div.setAttribute('onclick', 'toggleExpand(this)');
                        div.style.opacity = '0';
                        div.style.animation = 'slideIn 0.4s ease forwards';

                        div.innerHTML = `
                            <div class="card-header">
                                <div class="card-meta">
                                    <span>[${formatTime(msg.timestamp)}]</span>
                                    <div class="routing-info">
                                        <span class="src-dst">${msg.sender_id}</span>
                                        <span class="arrow">→</span>
                                        <span class="src-dst ${destClass}">${icon} ${msg.recipient_id}</span>
                                    </div>
                                </div>
                                <div class="mission-tag">${msg.mission_tag}</div>
                            </div>
                            <div class="card-body">
                                ${msg.intel_body}
                            </div>
                            <div class="expand-hint">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
                                Click to expand
                            </div>
                        `;

                        feedContainer.prepend(div);
                    }
                }

            } catch (error) {
                console.error("Failed to fetch dashboard data:", error);
            }
        }

        // Initial fetch
        updateDashboard();

        // Polling every 3 seconds
        setInterval(updateDashboard, 3000);
    </script>
</body>

</html>
